<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2b43f"/>
      <stop offset="100%" stop-color="#f0d078"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7.68" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="40.96" y="40.96" width="430.08" height="430.08" 
        rx="92.16" ry="92.16" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="51.2" y="51.2" 
        width="409.59999999999997" height="409.59999999999997" 
        rx="81.92" ry="81.92" 
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3.072"/>

  <!-- Decorative hexagonal ring -->
  <polygon points="256,101.1712 390.0856740374601,178.5856 390.0856740374601,333.4144 256,410.8288 121.91432596253992,333.41440000000006 121.91432596253983,178.5856000000001" 
           fill="none" stroke="rgba(226,180,63,0.15)" stroke-width="4.096"/>

  <!-- Question mark with golden accent -->
  <text x="256" y="303.9232" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="266.24" 
        font-weight="bold"
        fill="url(#accent)" 
        text-anchor="middle" 
        filter="url(#glow)"
        dominant-baseline="central">?</text>

  <!-- Small decorative lines at corners -->
  <line x1="81.92" y1="112.64000000000001" 
        x2="133.12" y2="112.64000000000001" 
        stroke="rgba(226,180,63,0.4)" stroke-width="4.096" stroke-linecap="round"/>
  <line x1="430.08000000000004" y1="399.36" 
        x2="378.88" y2="399.36" 
        stroke="rgba(226,180,63,0.4)" stroke-width="4.096" stroke-linecap="round"/>
</svg>