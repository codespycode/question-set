<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Question Bank</title>
  <script>
    // GitHub Pages SPA redirect: converts the path to a hash-based URL
    // so Angular's HashLocationStrategy can handle it.
    var pathSegmentsToKeep = 1; // repo is at /<repo-name>/
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/#/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  Redirecting&hellip;
</body>
</html>
